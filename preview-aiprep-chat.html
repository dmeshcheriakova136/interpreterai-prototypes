<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>InterpretAI — Conversational Onboarding</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  :root {
    --blue-500:#0066FF; --blue-600:#0052CC; --blue-100:#DEEAFF; --blue-50:#EEF4FF;
    --white:#FFFFFF; --gray-50:#F7F7F8; --gray-100:#EFEFEF; --gray-200:#D9D9D9;
    --gray-500:#8E8E93; --gray-900:#1A1A1A;
    --red-500:#E53935; --red-100:#FFEBEE;
    --green-500:#34C759; --green-50:#E8F8ED;
    --gold-500:#F0AD4E; --gold-50:#FFF8E7;
  }

  body {
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
    background:#f0f0f0;
    display:flex; justify-content:center; align-items:center; min-height:100vh;
  }

  .phone {
    width:390px; height:844px; background:var(--white);
    border-radius:40px; overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.15);
    display:flex; flex-direction:column; position:relative;
  }

  /* Status bar */
  .status-bar {
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 28px 0; height:54px; flex-shrink:0;
  }
  .status-bar .time { font-size:16px; font-weight:600; color:var(--gray-900); }
  .status-bar .icons { display:flex; gap:6px; align-items:center; }
  .status-bar .icons svg { width:18px; height:18px; }

  /* Chat area */
  .chat-area {
    flex:1; overflow-y:auto; padding:16px;
    display:flex; flex-direction:column; gap:8px;
    scroll-behavior:smooth;
  }
  .chat-area::-webkit-scrollbar { display:none; }

  /* Messages */
  .msg { max-width:85%; display:flex; flex-direction:column; gap:4px; }
  .msg.ai { align-self:flex-start; }
  .msg.user { align-self:flex-end; }

  .msg-row { display:flex; gap:8px; align-items:flex-end; }
  .msg.ai .msg-row { flex-direction:row; }
  .msg.user .msg-row { flex-direction:row-reverse; }

  .msg-avatar {
    width:32px; height:32px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:600;
  }
  .msg.ai .msg-avatar { background:var(--blue-100); color:var(--blue-500); }
  .msg.user .msg-avatar { background:var(--gray-100); color:var(--gray-500); }

  .bubble {
    padding:12px 16px; font-size:15px; line-height:22px; color:var(--gray-900);
  }
  .msg.ai .bubble { background:var(--gray-50); border-radius:16px 16px 16px 4px; }
  .msg.user .bubble { background:var(--blue-500); color:var(--white); border-radius:16px 16px 4px 16px; }
  .bubble strong { font-weight:600; }

  /* Welcome hero */
  .welcome-hero {
    text-align:center; padding:40px 20px 20px;
  }
  .welcome-logo {
    width:72px; height:72px; border-radius:20px;
    background:linear-gradient(135deg, var(--blue-500), var(--blue-600));
    margin:0 auto 16px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 24px rgba(0,102,255,.25);
  }
  .welcome-logo svg { width:36px; height:36px; color:var(--white); }
  .welcome-title { font-size:28px; font-weight:700; color:var(--gray-900); margin-bottom:6px; }
  .welcome-sub { font-size:15px; color:var(--gray-500); line-height:22px; }

  /* Inline option chips for chat */
  .chat-options {
    display:flex; flex-wrap:wrap; gap:8px; max-width:85%;
    align-self:flex-start; padding-left:40px;
  }
  .chat-option {
    padding:10px 18px; border-radius:20px;
    background:var(--white); border:1.5px solid var(--blue-500);
    color:var(--blue-500); font-size:14px; font-weight:500;
    cursor:pointer; transition:all .2s; font-family:inherit;
  }
  .chat-option:active { transform:scale(.96); }
  .chat-option:hover { background:var(--blue-50); }
  .chat-option.selected {
    background:var(--blue-500); color:var(--white); border-color:var(--blue-500);
    pointer-events:none;
  }
  .chat-option.disabled {
    opacity:.4; pointer-events:none;
  }

  /* Inline language grid */
  .lang-grid {
    display:grid; grid-template-columns:repeat(2, 1fr); gap:8px;
    max-width:85%; align-self:flex-start; padding-left:40px;
  }
  .lang-option {
    padding:12px 16px; border-radius:14px;
    background:var(--white); border:1.5px solid var(--gray-200);
    font-size:14px; font-weight:500; color:var(--gray-900);
    cursor:pointer; transition:all .2s; font-family:inherit;
    display:flex; align-items:center; gap:8px;
  }
  .lang-option:hover { border-color:var(--blue-500); background:var(--blue-50); }
  .lang-option:active { transform:scale(.97); }
  .lang-option .flag { font-size:20px; }
  .lang-option.selected {
    border-color:var(--blue-500); background:var(--blue-500); color:var(--white);
    pointer-events:none;
  }
  .lang-option.disabled { opacity:.4; pointer-events:none; }

  /* Detail text area inside chat */
  .chat-textarea-wrap {
    max-width:100%; width:100%; align-self:stretch;
    display:flex; flex-direction:column; gap:8px;
  }
  .chat-textarea {
    width:100%; min-height:100px; border-radius:14px;
    background:var(--gray-50); border:1.5px solid var(--gray-200);
    padding:12px 16px; font-size:14px; font-family:inherit;
    color:var(--gray-900); resize:none; outline:none; line-height:20px;
  }
  .chat-textarea:focus { border-color:var(--blue-500); }
  .chat-textarea::placeholder { color:var(--gray-500); }
  .chat-textarea-send {
    align-self:flex-end; padding:10px 20px; border-radius:20px;
    background:var(--blue-500); color:var(--white);
    font-size:14px; font-weight:600; border:none; cursor:pointer;
    font-family:inherit; transition:all .2s;
  }
  .chat-textarea-send:active { background:var(--blue-600); transform:scale(.97); }

  /* Typing indicator */
  .typing { display:flex; gap:8px; align-items:flex-end; align-self:flex-start; }
  .typing-dots {
    background:var(--gray-50); border-radius:16px 16px 16px 4px;
    padding:14px 18px; display:flex; gap:5px;
  }
  .typing-dots span {
    width:8px; height:8px; border-radius:50%; background:var(--gray-500);
    animation:bounce .6s infinite alternate;
  }
  .typing-dots span:nth-child(2) { animation-delay:.2s; }
  .typing-dots span:nth-child(3) { animation-delay:.4s; }
  @keyframes bounce { to { opacity:.3; transform:translateY(-4px); } }

  /* Term results card */
  .term-card {
    background:var(--white); border-radius:16px; overflow:hidden;
    max-width:100%; width:100%; align-self:stretch;
    border:1px solid var(--gray-100);
  }
  .term-card-header {
    background:linear-gradient(135deg, var(--blue-50), var(--blue-100));
    padding:16px; display:flex; align-items:center; gap:10px;
  }
  .term-card-icon {
    width:40px; height:40px; border-radius:12px; background:var(--blue-500);
    display:flex; align-items:center; justify-content:center;
  }
  .term-card-icon svg { width:20px; height:20px; color:var(--white); }
  .term-card-title { font-size:17px; font-weight:600; color:var(--gray-900); }
  .term-card-sub { font-size:13px; color:var(--gray-500); }
  .term-card-body { padding:4px 16px; }

  .term-row {
    display:flex; align-items:center; padding:12px 0;
    border-bottom:1px solid var(--gray-100); gap:12px;
  }
  .term-row:last-child { border-bottom:none; }
  .term-num {
    width:28px; height:28px; border-radius:50%;
    background:var(--blue-50); color:var(--blue-500);
    font-size:11px; font-weight:600;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .term-texts { flex:1; }
  .term-en { font-size:15px; font-weight:600; color:var(--gray-900); }
  .term-es { font-size:14px; color:var(--blue-500); font-weight:500; margin-top:2px; }
  .term-add {
    width:36px; height:36px; border-radius:50%; border:1.5px solid var(--blue-500);
    background:var(--blue-50); cursor:pointer; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition:all .2s; margin-left:auto;
  }
  .term-add:active { transform:scale(.9); }
  .term-add svg { width:18px; height:18px; color:var(--blue-500); }
  .term-add.saved { background:var(--green-500); border-color:var(--green-500); }
  .term-add.saved svg { color:var(--white); }

  .save-all-bar {
    padding:12px 16px; border-top:1px solid var(--gray-100);
    display:flex; gap:8px;
  }
  .save-all-btn {
    flex:1; padding:12px; border-radius:12px; border:none;
    font-size:14px; font-weight:600; cursor:pointer;
    font-family:inherit; transition:all .2s;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .save-all-btn:active { transform:scale(.98); }
  .save-all-btn.primary { background:var(--blue-500); color:var(--white); }
  .save-all-btn.primary:active { background:var(--blue-600); }
  .save-all-btn.secondary { background:var(--gray-50); color:var(--gray-900); border:1px solid var(--gray-200); }
  .save-all-btn.saved { background:var(--green-500); color:var(--white); }

  /* Progress dots at top */
  .progress-dots {
    display:flex; justify-content:center; gap:6px;
    padding:8px 0 4px; flex-shrink:0;
  }
  .pdot {
    width:8px; height:8px; border-radius:50%;
    background:var(--gray-200); transition:all .3s;
  }
  .pdot.active { background:var(--blue-500); width:24px; border-radius:4px; }
  .pdot.done { background:var(--green-500); }

  /* Tab bar */
  .tab-bar {
    display:flex; align-items:center; justify-content:space-around;
    padding:8px 0 28px; background:var(--white);
    box-shadow:0 -1px 4px rgba(0,0,0,.06); flex-shrink:0;
  }
  .tab-item {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    cursor:pointer; padding:6px 16px; border-radius:20px;
    background:transparent; border:none; transition:all .25s;
  }
  .tab-item.active { background:var(--gray-50); }
  .tab-item svg { width:24px; height:24px; }
  .tab-item.active svg { color:var(--blue-500); }
  .tab-item:not(.active) svg { color:var(--gray-500); }
  .tab-label { font-size:13px; font-weight:500; }
  .tab-item.active .tab-label { color:var(--blue-500); }
  .tab-item:not(.active) .tab-label { color:var(--gray-500); }

  .fade-in { animation:fadeIn .4s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .hidden { display:none !important; }
</style>
</head>
<body>

<div class="phone">
  <!-- Status bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg viewBox="0 0 20 20" fill="currentColor"><rect x="1" y="10" width="3" height="8" rx="1"/><rect x="6" y="7" width="3" height="11" rx="1"/><rect x="11" y="4" width="3" height="14" rx="1"/><rect x="16" y="1" width="3" height="17" rx="1"/></svg>
      <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 4C6.5 4 3.4 5.6 1.2 8.2a1 1 0 001.5 1.3C4.5 7.2 7.1 6 10 6s5.5 1.2 7.3 3.5a1 1 0 001.5-1.3C16.6 5.6 13.5 4 10 4zm0 5c-2 0-3.9.8-5.3 2.2a1 1 0 001.4 1.4C7.2 11.5 8.5 11 10 11s2.8.5 3.9 1.6a1 1 0 001.4-1.4C13.9 9.8 12 9 10 9zm0 5a2 2 0 100 4 2 2 0 000-4z"/></svg>
      <svg viewBox="0 0 28 14" fill="currentColor"><rect x="0" y="1" width="22" height="12" rx="2.5" stroke="currentColor" fill="none" stroke-width="1"/><rect x="23" y="4.5" width="2.5" height="5" rx="1"/><rect x="2" y="3" width="17" height="8" rx="1.5"/></svg>
    </div>
  </div>

  <!-- Progress dots -->
  <div class="progress-dots" id="progressDots">
    <div class="pdot active" id="pdot0"></div>
    <div class="pdot" id="pdot1"></div>
    <div class="pdot" id="pdot2"></div>
    <div class="pdot" id="pdot3"></div>
    <div class="pdot" id="pdot4"></div>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chatArea">

    <!-- Welcome hero -->
    <div class="welcome-hero fade-in" id="welcomeHero">
      <div class="welcome-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2z"/></svg>
      </div>
      <div class="welcome-title">InterpretAI</div>
      <div class="welcome-sub">Let's set up your prep session.<br>I'll walk you through it — just a few quick questions.</div>
    </div>

  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-item" onclick="location.href='preview-tabbar.html'">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 2a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6H6zm0 2h7v5h5v11H6V4zm2 8v2h8v-2H8zm0 4v2h5v-2H8z"/></svg>
      <span class="tab-label">Glossary</span>
    </button>
    <button class="tab-item active">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2z"/></svg>
      <span class="tab-label">AI Prep</span>
    </button>
    <button class="tab-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 4a2 2 0 012-2h8a2 2 0 012 2v1h2a2 2 0 012 2v12a2 2 0 01-2 2H8a2 2 0 01-2-2v-1H4a2 2 0 01-2-2V6a2 2 0 012-2zm4 15h10V7H8v12zM6 6v10h0V6z"/></svg>
      <span class="tab-label">Study</span>
    </button>
    <button class="tab-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/></svg>
      <span class="tab-label">Profile</span>
    </button>
  </div>
</div>

<script>
const chat = document.getElementById('chatArea');
let step = 0;
let selections = { lang: '', field: '', setting: '', details: '' };

const sampleTerms = {
  Medical: [
    ['Knee replacement','Reemplazo de rodilla'],['Prosthesis','Prótesis'],
    ['Range of motion','Rango de movimiento'],['Physical therapy','Fisioterapia'],
    ['Blood thinner','Anticoagulante'],['Incision','Incisión'],
    ['Swelling','Hinchazón'],['Follow-up','Cita de seguimiento'],
    ['Inflammation','Inflamación'],['Sutures','Suturas']
  ],
  Legal: [
    ['Plaintiff','Demandante'],['Defendant','Demandado'],
    ['Testimony','Testimonio'],['Evidence','Evidencia'],
    ['Verdict','Veredicto'],['Bail','Fianza'],
    ['Custody','Custodia'],['Sentence','Sentencia'],
    ['Appeal','Apelación'],['Subpoena','Citación']
  ],
  Education: [
    ['IEP','Plan educativo individualizado'],['Accommodation','Adaptación'],
    ['Assessment','Evaluación'],['Grade level','Nivel de grado'],
    ['Special education','Educación especial'],['Disability','Discapacidad'],
    ['Progress report','Informe de progreso'],['Enrollment','Inscripción'],
    ['Attendance','Asistencia'],['Transcript','Expediente académico']
  ],
  'Community Services': [
    ['Benefits','Beneficios'],['Eligibility','Elegibilidad'],
    ['Case worker','Trabajador social'],['Housing assistance','Asistencia de vivienda'],
    ['Application','Solicitud'],['Income verification','Verificación de ingresos'],
    ['Dependent','Dependiente'],['Referral','Referencia'],
    ['Shelter','Refugio'],['Counseling','Consejería']
  ],
  Business: [
    ['Revenue','Ingresos'],['Stakeholder','Parte interesada'],
    ['Merger','Fusión'],['Budget','Presupuesto'],
    ['Invoice','Factura'],['Contract','Contrato'],
    ['Deadline','Fecha límite'],['Compliance','Cumplimiento'],
    ['Negotiation','Negociación'],['Strategy','Estrategia']
  ]
};

// Start the conversation after a brief pause
setTimeout(() => startConversation(), 800);

function startConversation() {
  addAIMessage("Hi there! 👋 I'm your AI prep assistant. Let's get you ready for your next interpreting assignment.");
  setTimeout(() => {
    addAIMessage("First — <strong>what's your language pair?</strong>");
    setTimeout(() => showLanguageOptions(), 400);
  }, 1000);
}

function addAIMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg ai fade-in';
  div.innerHTML = `
    <div class="msg-row">
      <div class="msg-avatar">AI</div>
      <div class="bubble">${text}</div>
    </div>
  `;
  chat.appendChild(div);
  scrollDown();
}

function addUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg user fade-in';
  div.innerHTML = `
    <div class="msg-row">
      <div class="msg-avatar">U</div>
      <div class="bubble">${text}</div>
    </div>
  `;
  chat.appendChild(div);
  scrollDown();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing fade-in';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-avatar" style="background:var(--blue-100);color:var(--blue-500);font-size:14px;font-weight:600;">AI</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  `;
  chat.appendChild(div);
  scrollDown();
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function scrollDown() {
  setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
}

function updateProgress(stepNum) {
  for (let i = 0; i < 5; i++) {
    const dot = document.getElementById('pdot' + i);
    dot.className = 'pdot';
    if (i < stepNum) dot.classList.add('done');
    else if (i === stepNum) dot.classList.add('active');
  }
}

// STEP 1: Language pair
function showLanguageOptions() {
  updateProgress(0);
  const div = document.createElement('div');
  div.className = 'lang-grid fade-in';
  div.id = 'langOptions';
  const langs = [
    ['🇪🇸','Spanish ↔ English'],
    ['🇦🇷','Arabic ↔ English'],
    ['🇺🇦','Ukrainian ↔ English'],
    ['🇹🇷','Turkish ↔ English'],
    ['🇫🇷','French ↔ English'],
    ['🇨🇳','Mandarin ↔ English'],
    ['🇵🇰','Urdu ↔ English'],
    ['🇦🇫','Pashto ↔ English']
  ];
  div.innerHTML = langs.map(([flag, name]) =>
    `<button class="lang-option" onclick="selectLang(this, '${name}')">
      <span class="flag">${flag}</span>${name}
    </button>`
  ).join('');
  chat.appendChild(div);
  scrollDown();
}

function selectLang(el, lang) {
  selections.lang = lang;
  el.classList.add('selected');
  el.parentElement.querySelectorAll('.lang-option').forEach(o => {
    if (o !== el) o.classList.add('disabled');
  });

  setTimeout(() => {
    addUserMessage(lang);
    showTyping();
    setTimeout(() => {
      hideTyping();
      updateProgress(1);
      addAIMessage(`Great, <strong>${lang}</strong>! Now — <strong>what field is your assignment in?</strong>`);
      setTimeout(() => showFieldOptions(), 400);
    }, 1000);
  }, 300);
}

// STEP 2: Field
function showFieldOptions() {
  const div = document.createElement('div');
  div.className = 'chat-options fade-in';
  div.id = 'fieldOptions';
  const fields = ['Medical', 'Legal', 'Education', 'Business', 'Community Services'];
  div.innerHTML = fields.map(f =>
    `<button class="chat-option" onclick="selectField(this, '${f}')">${f}</button>`
  ).join('');
  chat.appendChild(div);
  scrollDown();
}

function selectField(el, field) {
  selections.field = field;
  el.classList.add('selected');
  el.parentElement.querySelectorAll('.chat-option').forEach(o => {
    if (o !== el) o.classList.add('disabled');
  });

  setTimeout(() => {
    addUserMessage(field);
    showTyping();
    setTimeout(() => {
      hideTyping();
      updateProgress(2);
      addAIMessage(`Got it — <strong>${field}</strong>. <strong>What's the specific setting?</strong> For example: hospital clinic, courtroom, school meeting...`);
      setTimeout(() => showSettingOptions(field), 400);
    }, 1000);
  }, 300);
}

// STEP 3: Setting
function showSettingOptions(field) {
  const settings = {
    Medical: ['Hospital clinic', 'Emergency room', 'Pharmacy', 'Specialist office', 'Telehealth visit'],
    Legal: ['Courtroom', 'Deposition', 'Immigration hearing', 'Attorney meeting', 'Police station'],
    Education: ['IEP meeting', 'Parent-teacher conference', 'Enrollment office', 'School counselor', 'Classroom'],
    Business: ['Board meeting', 'Negotiation', 'Conference', 'Client call', 'HR meeting'],
    'Community Services': ['Social services office', 'Housing authority', 'Food bank', 'Shelter intake', 'Benefits office']
  };

  const div = document.createElement('div');
  div.className = 'chat-options fade-in';
  div.id = 'settingOptions';
  div.innerHTML = (settings[field] || settings.Medical).map(s =>
    `<button class="chat-option" onclick="selectSetting(this, '${s}')">${s}</button>`
  ).join('');
  chat.appendChild(div);
  scrollDown();
}

function selectSetting(el, setting) {
  selections.setting = setting;
  el.classList.add('selected');
  el.parentElement.querySelectorAll('.chat-option').forEach(o => {
    if (o !== el) o.classList.add('disabled');
  });

  setTimeout(() => {
    addUserMessage(setting);
    showTyping();
    setTimeout(() => {
      hideTyping();
      updateProgress(3);
      addAIMessage("Almost there! <strong>Any extra details?</strong> The more context, the better your glossary. Or just tap <strong>Skip</strong> to generate now.");
      setTimeout(() => showDetailsInput(), 400);
    }, 1000);
  }, 300);
}

// STEP 4: Details (optional)
function showDetailsInput() {
  const div = document.createElement('div');
  div.className = 'chat-textarea-wrap fade-in';
  div.id = 'detailsWrap';
  div.innerHTML = `
    <textarea class="chat-textarea" id="detailsText" placeholder="e.g., Patient had knee replacement 6 weeks ago, post-op check-up, will discuss recovery and medications..."></textarea>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="chat-textarea-send" style="background:var(--gray-50);color:var(--gray-900);border:1px solid var(--gray-200);" onclick="skipDetails()">Skip</button>
      <button class="chat-textarea-send" onclick="submitDetails()">Send</button>
    </div>
  `;
  chat.appendChild(div);
  scrollDown();
}

function skipDetails() {
  document.getElementById('detailsWrap').classList.add('hidden');
  addUserMessage("No extra details — generate it!");
  generateGlossary();
}

function submitDetails() {
  const text = document.getElementById('detailsText').value.trim();
  document.getElementById('detailsWrap').classList.add('hidden');
  if (text) {
    selections.details = text;
    addUserMessage(text);
  } else {
    addUserMessage("No extra details — generate it!");
  }
  generateGlossary();
}

function buildTermRows(terms) {
  var html = '';
  for (var i = 0; i < terms.length; i++) {
    html += '<div class="term-row">' +
      '<div class="term-num">' + (i + 1) + '</div>' +
      '<div class="term-texts">' +
        '<div class="term-en">' + terms[i][0] + '</div>' +
        '<div class="term-es">' + terms[i][1] + '</div>' +
      '</div>' +
      '<button class="term-add" onclick="toggleTerm(this)">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>' +
      '</button>' +
    '</div>';
  }
  return html;
}

// STEP 5: Generate glossary
function generateGlossary() {
  updateProgress(4);
  showTyping();

  setTimeout(function() {
    hideTyping();
    addAIMessage('Here\'s your personalized <strong>' + selections.field + '</strong> glossary for <strong>' + selections.lang + '</strong> at a <strong>' + selections.setting + '</strong>:');

    setTimeout(function() {
      var terms = sampleTerms[selections.field] || sampleTerms.Medical;
      var termCard = document.createElement('div');
      termCard.className = 'term-card fade-in';
      termCard.innerHTML =
        '<div class="term-card-header">' +
          '<div class="term-card-icon">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>' +
          '</div>' +
          '<div>' +
            '<div class="term-card-title">' + selections.field + ' — ' + selections.setting + '</div>' +
            '<div class="term-card-sub">' + terms.length + ' terms · ' + selections.lang + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="term-card-body">' +
          buildTermRows(terms) +
        '</div>' +
        '<div class="save-all-bar">' +
          '<button class="save-all-btn secondary" onclick="startOver()">Start Over</button>' +
          '<button class="save-all-btn primary" id="saveAllBtn" onclick="saveAllTerms()">Save All to Glossary</button>' +
        '</div>';
      chat.appendChild(termCard);
      scrollDown();

      setTimeout(function() {
        addAIMessage('Tap <strong>+</strong> to save individual terms, or <strong>Save All</strong> to add everything to your glossary. Want to study them right away?');
        scrollDown();
      }, 600);
    }, 500);
  }, 2000);
}

function toggleTerm(btn) {
  if (btn.classList.contains('saved')) {
    btn.classList.remove('saved');
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
  } else {
    btn.classList.add('saved');
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>';
  }
}

function saveAllTerms() {
  const btn = document.getElementById('saveAllBtn');
  document.querySelectorAll('.term-add').forEach(t => {
    if (!t.classList.contains('saved')) toggleTerm(t);
  });
  btn.classList.remove('primary');
  btn.classList.add('saved');
  btn.innerHTML = '✓ Saved to Glossary!';
  btn.onclick = null;
}

function startOver() {
  // Reset everything
  chat.innerHTML = `
    <div class="welcome-hero fade-in" id="welcomeHero">
      <div class="welcome-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2z"/></svg>
      </div>
      <div class="welcome-title">InterpretAI</div>
      <div class="welcome-sub">Let's set up your prep session.<br>I'll walk you through it — just a few quick questions.</div>
    </div>
  `;
  step = 0;
  selections = { lang: '', field: '', setting: '', details: '' };
  updateProgress(0);
  setTimeout(() => startConversation(), 800);
}
</script>
</body>
</html>
